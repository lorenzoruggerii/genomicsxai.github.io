<script type="application/ld+json">
{{- $zenodoStore := hugo.Data.zenodo | default dict -}}
{{- $zenodoEntry := dict -}}
{{- with .Params.post_id -}}
  {{- with index $zenodoStore . -}}
    {{- $zenodoEntry = . -}}
  {{- end -}}
{{- end -}}
{{- $doi := $zenodoEntry.current_doi | default (.Params.doi | default "") -}}
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title | htmlEscape }}",
  "datePublished": "{{ .Date | dateFormat "2006-01-02" }}",
  "dateModified": "{{ .Params.date_accepted | default .Date | dateFormat "2006-01-02" }}",
  "author": [
    {{- $authList := .Params.authors_display | default .Params.authors -}}
    {{- range $index, $author := $authList -}}
      {{- if $index }},{{ end }}
      {{- if reflect.IsMap $author -}}
      {
        "@type": "Person",
        "name": "{{ $author.name | htmlEscape }}",
        "affiliation": "{{ $author.affiliation | htmlEscape }}",
        {{ with $author.orcid }}
        "identifier": "https://orcid.org/{{ . }}"
        {{ end }}
      }
      {{- else -}}
      { "@type": "Person", "name": "{{ $author | htmlEscape }}" }
      {{- end -}}
    {{- end }}
  ],
  "publisher": {
    "@type": "Organization",
    "name": "Genomics × AI Blog",
    "url": "https://genomicsxai.github.io"
  },
  {{ with $doi }}
  "identifier": "https://doi.org/{{ . }}",
  {{ end }}
  "keywords": [
    {{- range $index, $tag := .Params.tags -}}
      {{- if $index }},{{ end }}
      "{{ $tag | htmlEscape }}"
    {{- end }}
  ],
  "url": "{{ .Permalink }}"
}
</script>
