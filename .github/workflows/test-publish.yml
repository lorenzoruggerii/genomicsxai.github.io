name: test-publish

on:
  push:
    branches:
      - issue-24-add-doi
    paths:
      - 'content/blogs/**'
      - 'data/zenodo.json'
      - 'layouts/**'
      - 'config.toml'
      - 'config/**'
      - '.github/scripts/**'
      - '.github/workflows/test-publish.yml'
  workflow_dispatch:
    inputs:
      blog_post_paths:
        description: "Optional space-separated list of content/blogs/*/index.md paths to treat as changed"
        required: false
        type: string
      preview_slug:
        description: "Optional preview path suffix under /previews/manual/"
        required: false
        type: string
      deploy_preview:
        description: "Deploy the built site to gh-pages under a preview path"
        required: false
        default: true
        type: boolean
      zenodo_dry_run:
        description: "If true, log intended Zenodo actions without creating records"
        required: false
        default: true
        type: boolean
      zenodo_api_base:
        description: "Zenodo API base URL. Use sandbox.zenodo.org/api for safe end-to-end tests."
        required: false
        default: "https://sandbox.zenodo.org/api"
        type: string

concurrency:
  group: test-publish-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GH_CONTENTS_WRITE_TOKEN || github.token }}
          submodules: true
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          extended: true

      - name: Resolve preview path
        id: preview
        shell: bash
        run: |
          RAW="${{ github.event.inputs.preview_slug }}"
          if [ -z "$RAW" ]; then
            RAW="${{ github.ref_name }}"
          fi
          SAFE=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          if [ -z "$SAFE" ]; then
            SAFE="run-${{ github.run_id }}"
          fi
          DEST="previews/manual/${SAFE}"
          URL="https://genomicsxai.github.io/${DEST}/"
          echo "destination_dir=${DEST}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Using preview path ${DEST}"

      - name: Detect available write tokens
        id: token_flags
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
          GH_DISCUSSIONS_TOKEN: ${{ secrets.GH_DISCUSSIONS_TOKEN }}
        shell: bash
        run: |
          if [ -n "$GH_PAGES_TOKEN" ]; then
            echo "has_pages_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pages_token=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$GH_DISCUSSIONS_TOKEN" ]; then
            echo "has_discussions_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_discussions_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve preview behavior
        id: preview_flags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_deploy_preview=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.deploy_preview }}" = "true" ]; then
            echo "should_deploy_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure blog discussions
        if: steps.token_flags.outputs.has_discussions_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_DISCUSSIONS_TOKEN }}
        run: |
          chmod +x .github/scripts/ensure-blog-discussions.sh
          ./.github/scripts/ensure-blog-discussions.sh

      - name: Export blog discussion URLs
        if: steps.token_flags.outputs.has_discussions_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_DISCUSSIONS_TOKEN }}
        run: |
          chmod +x .github/scripts/export-blog-discussion-urls.sh
          ./.github/scripts/export-blog-discussion-urls.sh

      - name: Stub discussion data for preview
        if: steps.token_flags.outputs.has_discussions_token != 'true'
        run: |
          mkdir -p data
          echo '{}' > data/discussions.json
          echo "GH_DISCUSSIONS_TOKEN is not configured; using empty discussions data for preview."

      - name: Fetch editors from GitHub team
        env:
          GH_TOKEN: ${{ secrets.GH_EDITORS_TOKEN }}
          ORG: genomicsxai
          TEAM: editors
        run: |
          chmod +x .github/scripts/fetch-editors.sh
          ./.github/scripts/fetch-editors.sh

      - name: Detect changed blog posts
        id: changed_blogs
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.blog_post_paths }}"
          if [ -n "$INPUT" ]; then
            read -r -a files <<< "$INPUT"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              mapfile -t files < <(git diff --name-only "$BEFORE" "$AFTER" -- 'content/blogs/*/index.md' | sort)
            else
              git fetch origin main:refs/remotes/origin/main --depth=1
              BASE=$(git merge-base HEAD refs/remotes/origin/main)
              mapfile -t files < <(git diff --name-only "$BASE" HEAD -- 'content/blogs/*/index.md' | sort)
            fi
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "accepted_count=0" >> "$GITHUB_OUTPUT"
            echo "No changed blog posts detected."
            exit 0
          fi
          printf '%s\n' "${files[@]}" > /tmp/changed-blog-posts.txt
          accepted_count=0
          while IFS= read -r path; do
            status=$(ruby -e 'require "yaml"; require "date"; raw = File.read(ARGV[0]); match = raw.match(/\A---\s*\n(.*?)\n---\s*\n/m) or abort("Missing frontmatter in #{ARGV[0]}"); fm = YAML.safe_load(match[1], permitted_classes: [Date, Time], aliases: true) || {}; print fm["status"].to_s' "$path")
            if [ "$status" = "accepted" ]; then
              accepted_count=$((accepted_count + 1))
            fi
          done < /tmp/changed-blog-posts.txt
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "accepted_count=${accepted_count}" >> "$GITHUB_OUTPUT"
          echo "Changed blog posts:"
          cat /tmp/changed-blog-posts.txt

      - name: Validate selected blog posts for Zenodo testing
        if: steps.changed_blogs.outputs.count != '0' && github.event.inputs.blog_post_paths != ''
        shell: bash
        run: |
          while IFS= read -r path; do
            if [ ! -f "$path" ]; then
              echo "Selected blog post does not exist: $path"
              exit 1
            fi
            status=$(ruby -e 'require "yaml"; require "date"; raw = File.read(ARGV[0]); match = raw.match(/\A---\s*\n(.*?)\n---\s*\n/m) or abort("Missing frontmatter in #{ARGV[0]}"); fm = YAML.safe_load(match[1], permitted_classes: [Date, Time], aliases: true) || {}; print fm["status"].to_s' "$path")
            if [ "$status" != "accepted" ]; then
              echo "Selected blog post is not accepted: $path (status: ${status:-<empty>})"
              echo "Zenodo testing expects posts with frontmatter status: accepted"
              exit 1
            fi
          done < /tmp/changed-blog-posts.txt

      - name: Validate required test-publish secrets
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
          GH_CONTENTS_WRITE_TOKEN: ${{ secrets.GH_CONTENTS_WRITE_TOKEN }}
          ZENODO_API_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
        run: |
          if [ "${{ steps.preview_flags.outputs.should_deploy_preview }}" = "true" ] && [ -z "$GH_PAGES_TOKEN" ]; then
            echo "GH_PAGES_TOKEN is required when deploy_preview=true."
            exit 1
          fi
          if [ "${{ github.event.inputs.zenodo_dry_run || 'true' }}" != "true" ] && [ "${{ steps.changed_blogs.outputs.accepted_count }}" != "0" ]; then
            if [ -z "$ZENODO_API_TOKEN" ]; then
              echo "ZENODO_API_TOKEN is required for non-dry-run Zenodo sync."
              exit 1
            fi
            if [ -z "$GH_CONTENTS_WRITE_TOKEN" ]; then
              echo "GH_CONTENTS_WRITE_TOKEN is required to commit updated data/zenodo.json."
              exit 1
            fi
          fi

      - name: Sync Zenodo DOI metadata
        if: steps.changed_blogs.outputs.count != '0'
        env:
          ZENODO_API_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_COMMUNITY: ${{ secrets.ZENODO_COMMUNITY }}
          ZENODO_API_BASE: ${{ github.event.inputs.zenodo_api_base }}
          SITE_URL: ${{ steps.preview.outputs.preview_url }}
          DRY_RUN: ${{ github.event.inputs.zenodo_dry_run == 'true' && '1' || '0' }}
        run: |
          if [ "$DRY_RUN" = "1" ] && [ -z "$ZENODO_API_TOKEN" ]; then
            echo "ZENODO_API_TOKEN is not configured; skipping live Zenodo sync because dry-run is enabled."
            exit 0
          fi
          if [ -z "$ZENODO_API_TOKEN" ]; then
            echo "ZENODO_API_TOKEN is not configured."
            exit 1
          fi
          chmod +x .github/scripts/sync-zenodo-dois.rb
          ruby .github/scripts/sync-zenodo-dois.rb $(tr '\n' ' ' < /tmp/changed-blog-posts.txt)

      - name: Commit Zenodo metadata
        if: steps.changed_blogs.outputs.count != '0' && github.event.inputs.zenodo_dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CONTENTS_WRITE_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain -- data/zenodo.json)" ]; then
            echo "No Zenodo metadata changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/zenodo.json
          git commit -m "chore: sync Zenodo DOI metadata"
          git push origin HEAD:${{ github.ref_name }}

      - name: Build
        run: |
          hugo --minify \
               --environment preview \
               --baseURL "${{ steps.preview.outputs.preview_url }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-publish-public
          path: public

      - name: Upload Zenodo metadata artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenodo-metadata
          path: data/zenodo.json

      - name: Deploy preview to gh-pages
        if: steps.preview_flags.outputs.should_deploy_preview == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: ${{ steps.preview.outputs.destination_dir }}
          keep_files: true

      - name: Summarize run
        shell: bash
        run: |
          {
            echo "## Test publish summary"
            echo ""
            echo "- Preview URL: ${{ steps.preview.outputs.preview_url }}"
            echo "- Deploy preview: ${{ steps.preview_flags.outputs.should_deploy_preview }}"
            echo "- Zenodo dry run: ${{ github.event.inputs.zenodo_dry_run }}"
            echo "- Zenodo API base: ${{ github.event.inputs.zenodo_api_base }}"
            echo "- Changed blog count: ${{ steps.changed_blogs.outputs.count || '0' }}"
            echo "- Explicit blog selection: ${{ github.event.inputs.blog_post_paths != '' && 'yes' || 'no' }}"
          } >> "$GITHUB_STEP_SUMMARY"
