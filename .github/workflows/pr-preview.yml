name: PR Preview

# pull_request_target runs in the base repo context so fork PRs have access to
# GITHUB_TOKEN for deploying to gh-pages. The base repo's workflow file is always
# used (not the PR's), so the workflow itself cannot be hijacked.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'content/blogs/**'

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      # Safety check: only proceed if the PR exclusively touches content/blogs/.
      # This guards against PRs that also modify layouts, scripts, or config,
      # which could (in theory) affect the build environment.
      - name: Check PR only modifies blog content
        id: safety
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}/files" \
            --jq '.[].filename')
          # Strip empty lines before checking so trailing newlines don't cause false positives
          NON_CONTENT=$(echo "$FILES" | grep -v '^content/blogs/' | grep -v '^[[:space:]]*$' || true)
          if [ -n "$NON_CONTENT" ]; then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "PR modifies files outside content/blogs/: $NON_CONTENT"
            # Pass the file list to the comment step
            echo "offending_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NON_CONTENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect available write tokens
        id: token_flags
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
          GH_PR_COMMENT_TOKEN: ${{ secrets.GH_PR_COMMENT_TOKEN }}
        shell: bash
        run: |
          if [ -n "$GH_PAGES_TOKEN" ]; then
            echo "has_pages_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pages_token=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$GH_PR_COMMENT_TOKEN" ]; then
            echo "has_pr_comment_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pr_comment_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Comment: preview skipped (unsafe PR)"
        if: steps.safety.outputs.safe == 'false' && steps.token_flags.outputs.has_pr_comment_token == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PR_COMMENT_TOKEN }}
        with:
          header: preview-deployment
          message: |
            ## Preview Deployment Skipped

            This PR modifies files outside `content/blogs/` — preview deployment is only available for PRs that exclusively add or edit blog post content.

            **Files detected outside `content/blogs/`:**
            ```
            ${{ steps.safety.outputs.offending_files }}
            ```

            Please remove these files from your PR branch (or ensure all your changes are within `content/blogs/YYYY-NNN/`) and push a new commit to trigger the preview again.

      # Safe to check out the PR head — we only run Hugo on markdown content.
      - name: Checkout PR head
        if: steps.safety.outputs.safe == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        if: steps.safety.outputs.safe == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          extended: true

      - name: Detect changed blog posts
        if: steps.safety.outputs.safe == 'true'
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_URL="https://genomicsxai.github.io/previews/pr-${{ github.event.number }}"
          SLUGS=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}/files" \
            --jq '[.[].filename
              | select(test("^content/blogs/[^/]+/"))
              | capture("content/blogs/(?P<slug>[^/]+)/").slug
            ] | unique | .[]')

          LINKS=""
          for slug in $SLUGS; do
            LINKS="${LINKS}- [${slug}](${BASE_URL}/blogs/${slug}/)"$'\n'
          done

          # Use heredoc to safely pass multi-line output
          echo "links<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LINKS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build preview site
        if: steps.safety.outputs.safe == 'true'
        run: |
          # Stub out data files generated at full-deploy time
          echo '{}' > data/discussions.json
          echo '[]' > data/editors.json
          hugo --minify \
               --environment preview \
               --baseURL "https://genomicsxai.github.io/previews/pr-${{ github.event.number }}/"

      - name: Deploy preview to gh-pages
        if: steps.safety.outputs.safe == 'true' && steps.token_flags.outputs.has_pages_token == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: previews/pr-${{ github.event.number }}
          keep_files: true

      - name: Post preview comment
        if: steps.safety.outputs.safe == 'true' && steps.token_flags.outputs.has_pr_comment_token == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PR_COMMENT_TOKEN }}
        with:
          header: preview-deployment
          message: |
            ## Preview Deployment Ready

            **Preview URL:** https://genomicsxai.github.io/previews/pr-${{ github.event.number }}/

            Posts in this PR:
            ${{ steps.detect.outputs.links }}
            > Not indexed by search engines and not linked from the main blog.
            > Updated automatically on each new commit. Deleted when the PR is closed.

      - name: Report missing preview deploy token
        if: steps.safety.outputs.safe == 'true' && steps.token_flags.outputs.has_pages_token != 'true'
        run: |
          echo "GH_PAGES_TOKEN is not configured; skipping PR preview deploy."
