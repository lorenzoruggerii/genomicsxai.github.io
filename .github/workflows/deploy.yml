name: Deploy Hugo Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/zenodo.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: github-pages

    steps:
      # 1. Checkout the repo (with submodules for theme)
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_CONTENTS_WRITE_TOKEN || github.token }}
          submodules: true
          fetch-depth: 0

      # 2. Setup Hugo
      - uses: peaceiris/actions-hugo@v3
        with:
          extended: true

      # 2.4. Ensure a GitHub Discussion exists for each blog post (for Giscus likes/comments)
      - name: Ensure blog discussions
        env:
          GH_TOKEN: ${{ secrets.GH_DISCUSSIONS_TOKEN }}
        run: |
          chmod +x .github/scripts/ensure-blog-discussions.sh
          ./.github/scripts/ensure-blog-discussions.sh

      # 2.4b. Export discussion URLs so "Discuss this post" and like/comment link to the right thread
      - name: Export blog discussion URLs
        env:
          GH_TOKEN: ${{ secrets.GH_DISCUSSIONS_TOKEN || github.token }}
        run: |
          chmod +x .github/scripts/export-blog-discussion-urls.sh
          ./.github/scripts/export-blog-discussion-urls.sh

      # 2.5. Fetch editorial board from GitHub team (optional: set GH_EDITORS_TOKEN with read:org)
      - name: Fetch editors from GitHub team
        env:
          GH_TOKEN: ${{ secrets.GH_EDITORS_TOKEN }}
          ORG: genomicsxai
          TEAM: editors
        run: |
          chmod +x .github/scripts/fetch-editors.sh
          ./.github/scripts/fetch-editors.sh

      # 2.6. Sync Zenodo DOI metadata for accepted blog posts changed in this push
      - name: Detect changed blog posts
        id: changed_blogs
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          mapfile -t files < <(git diff --name-only "$BEFORE" "$AFTER" -- 'content/blogs/*/index.md' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" > /tmp/changed-blog-posts.txt
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "Changed blog posts:"
          cat /tmp/changed-blog-posts.txt

      - name: Sync Zenodo DOI metadata
        if: steps.changed_blogs.outputs.count != '0'
        env:
          ZENODO_API_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_COMMUNITY: ${{ secrets.ZENODO_COMMUNITY }}
          SITE_URL: https://genomicsxai.github.io
        run: |
          if [ -z "$ZENODO_API_TOKEN" ]; then
            echo "ZENODO_API_TOKEN is not configured; skipping Zenodo DOI sync."
            exit 0
          fi
          chmod +x .github/scripts/sync-zenodo-dois.rb
          ruby .github/scripts/sync-zenodo-dois.rb $(tr '\n' ' ' < /tmp/changed-blog-posts.txt)

      - name: Commit Zenodo metadata
        if: steps.changed_blogs.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_CONTENTS_WRITE_TOKEN }}
        run: |
          if git diff --quiet -- data/zenodo.json; then
            echo "No Zenodo metadata changes to commit."
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_CONTENTS_WRITE_TOKEN is not configured; skipping commit of data/zenodo.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/zenodo.json
          git commit -m "chore: sync Zenodo DOI metadata"
          git push

      # 3. Build the Hugo site
      - name: Build
        run: hugo --minify

      # 3.5. Verify build output
      - name: List built files
        run: |
          echo "Build output directory contents:"
          ls -la public/ || echo "public directory not found!"
          echo ""
          echo "Checking for index.html:"
          ls -la public/index.html || echo "index.html not found!"
          echo ""
          echo "First few files in public:"
          find public -type f -name "*.html" | head -10

      # 4. Deploy to GitHub Pages
      - name: Deploy
        if: secrets.GH_PAGES_TOKEN != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # keep_files: true preserves the previews/ subdirectory across deploys
          keep_files: true

      - name: Report missing gh-pages token
        if: secrets.GH_PAGES_TOKEN == ''
        run: |
          echo "GH_PAGES_TOKEN is not configured; skipping gh-pages deploy."
